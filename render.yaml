services:
  - type: web
    name: hairconnekt-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        value: your_postgres_url_here
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
